[changelog]
header = "# Changelog\n\nAll notable changes to this project will be documented here.\n"
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
commit_parsers = [
    { message = "^[Aa]dd", group = "Added" },
    { message = "^[Ff]ix", group = "Fixed" },
    { message = "^[Uu]pdate|^[Ii]mprove|^[Rr]efine|^[Cc]lean", group = "Changed" },
    { message = "^[Rr]emove|^[Dd]rop|^[Dd]elete", group = "Removed" },
    { message = ".*", group = "Changed" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
